<html>
<head>
    <title>Калькулятор как в Windows 8.1</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1e3c5c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .calculator {
            background: #e6f0fa;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 360px;
            border: 2px solid #a0b9ce;
        }
        
        .display {
            background: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #8b9eb0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        
        #result {
            width: 100%;
            font-size: 32px;
            border: none;
            text-align: right;
            outline: none;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: white;
            color: #1e3c5c;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        
        button {
            padding: 15px 5px;
            font-size: 18px;
            border: 1px solid #8b9eb0;
            border-radius: 5px;
            cursor: pointer;
            background: #f0f8ff;
            color: #1e3c5c;
            font-weight: bold;
            box-shadow: 0 2px 3px rgba(0,0,0,0.2);
        }
        
        button:hover {
            background: #d4e4f5;
        }
        
        button:active {
            transform: translateY(1px);
            box-shadow: none;
        }
        
        .num {
            background: #fcfcfc;
        }
        
        .op {
            background: #d4e4f5;
        }
        
        .func {
            background: #c0d4e8;
        }
        
        .clear {
            background: #ffb6b6;
        }
        
        .equals {
            background: #ffd966;
            grid-column: span 2;
        }
        
        .zero {
            grid-column: span 2;
        }
        
        .memory-panel {
            background: #c0d4e8;
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            gap: 5px;
            font-size: 14px;
            border: 1px solid #8b9eb0;
        }
        
        .memory-btn {
            padding: 5px 10px;
            font-size: 14px;
            background: #e6f0fa;
            border: 1px solid #6b8ba0;
        }
        
        .memory-display {
            flex-grow: 1;
            text-align: right;
            padding: 5px;
            background: white;
            border-radius: 3px;
            border: 1px solid #8b9eb0;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div style="text-align:center; margin-bottom:10px; color:#1e3c5c; font-weight:bold; font-size:20px;">
        🧮 Инженерный калькулятор
    </div>
    
    <!-- Панель памяти -->
    <div class="memory-panel">
        <button class="memory-btn" onclick="memoryClear()">MC</button>
        <button class="memory-btn" onclick="memoryRecall()">MR</button>
        <button class="memory-btn" onclick="memoryAdd()">M+</button>
        <button class="memory-btn" onclick="memorySubtract()">M-</button>
        <div class="memory-display" id="memoryDisplay">0</div>
    </div>
    
    <!-- Экран -->
    <div class="display">
        <input type="text" id="result" readonly value="0">
    </div>
    
    <!-- Кнопки --><div class="buttons">
        <!-- Первый ряд -->
        <button class="func" onclick="addFunction('Math.PI')">π</button>
        <button class="func" onclick="addFunction('Math.E')">e</button>
        <button class="clear" onclick="clearAll()">C</button>
        <button class="clear" onclick="backspace()">⌫</button>
        <button class="op" onclick="addOperator('/')">÷</button>
        
        <!-- Второй ряд -->
        <button class="func" onclick="addFunction('Math.sin(')">sin</button>
        <button class="func" onclick="addFunction('Math.cos(')">cos</button>
        <button class="func" onclick="addFunction('Math.tan(')">tan</button>
        <button class="num" onclick="addNumber('7')">7</button>
        <button class="num" onclick="addNumber('8')">8</button>
        
        <!-- Третий ряд -->
        <button class="func" onclick="addFunction('Math.asin(')">sin⁻¹</button>
        <button class="func" onclick="addFunction('Math.acos(')">cos⁻¹</button>
        <button class="func" onclick="addFunction('Math.atan(')">tan⁻¹</button>
        <button class="num" onclick="addNumber('4')">4</button>
        <button class="num" onclick="addNumber('5')">5</button>
        
        <!-- Четвертый ряд -->
        <button class="func" onclick="addFunction('Math.log(')">ln</button>
        <button class="func" onclick="addFunction('Math.log10(')">log</button>
        <button class="func" onclick="addFunction('Math.sqrt(')">√</button>
        <button class="num" onclick="addNumber('1')">1</button>
        <button class="num" onclick="addNumber('2')">2</button>
        
        <!-- Пятый ряд -->
        <button class="func" onclick="addFunction('Math.pow(')">xʸ</button>
        <button class="func" onclick="addFunction('Math.abs(')">|x|</button>
        <button class="func" onclick="addFunction('1/')">1/x</button>
        <button class="num" onclick="addNumber('0')">0</button>
        <button class="num" onclick="addNumber('3')">3</button>
        
        <!-- Шестой ряд -->
        <button class="op" onclick="addOperator('(')">(</button>
        <button class="op" onclick="addOperator(')')">)</button>
        <button class="num" onclick="addNumber('.')">.</button>
        <button class="op" onclick="addOperator('+')">+</button>
        <button class="op" onclick="addOperator('-')">-</button>
        
        <!-- Седьмой ряд -->
        <button class="op" onclick="addOperator('*')">×</button>
        <button class="equals" colspan="2" onclick="calculate()">=</button>
    </div>
    
    <div style="margin-top:15px; color:#1e3c5c; font-size:12px; text-align:center;">
        ⚡ Примеры: sin(30*π/180) = 0.5 | 2^3 = 2³ = 8
    </div>
</div>

<script>
    let display = document.getElementById('result');
    let memory = 0;
    let memoryDisplay = document.getElementById('memoryDisplay');
    
    function addNumber(num) {
        if(display.value == '0' && num != '.') {
            display.value = num;
        } else {
            display.value += num;
        }
    }
    
    function addOperator(op) {
        display.value += op;
    }
    
    function addFunction(func) {
        display.value += func;
    }
    
    function clearAll() {
        display.value = '0';
    }
    
    function backspace() {
        if(display.value.length > 1) {
            display.value = display.value.slice(0, -1);
        } else {
            display.value = '0';
        }
    }
    
    function calculate() {
        try {
            // Заменяем × на * для eval
            let expression = display.value.replace(/×/g, '*');
            let result = eval(expression);
            display.value = result;
        } catch(e) {
            display.value = 'Ошибка';
        }
    }
    
    function memoryClear() {
        memory = 0;
        memoryDisplay.textContent = '0';}
    
    function memoryRecall() {
        display.value += memory;
    }
    
    function memoryAdd() {
        try {
            let value = eval(display.value);
            memory += value;
            memoryDisplay.textContent = memory;
        } catch(e) {}
    }
    
    function memorySubtract() {
        try {
            let value = eval(display.value);
            memory -= value;
            memoryDisplay.textContent = memory;
        } catch(e) {}
    }
    
    // Поддержка клавиатуры как в Windows
    document.addEventListener('keydown', function(e) {
        if(e.key >= '0' && e.key <= '9') addNumber(e.key);
        if(e.key == '.') addNumber('.');
        if(e.key == '+') addOperator('+');
        if(e.key == '-') addOperator('-');
        if(e.key == '*') addOperator('*');
        if(e.key == '/') addOperator('/');
        if(e.key == '(') addOperator('(');
        if(e.key == ')') addOperator(')');
        if(e.key == 'Enter') calculate();
        if(e.key == 'Escape') clearAll();
        if(e.key == 'Backspace') backspace();
        if(e.key == 'Delete') clearAll();
    });
</script>

</body>
</html>
